<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <form>
        <h1 class="text-center">Liên hệ với chúng tôi</h1>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Họ và tên</label>
            <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
                placeholder="Nhập họ tên">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Email</label>
            <input type="email" class="form-control" id="exampleInputPassword1" placeholder="Nhập email">
        </div>
        <div class="mb-3">
            <label for="floatingTextarea" >Tin nhắn </label>
            <textarea class="form-control" placeholder="Nhập tin nhắn" id="floatingTextarea"></textarea>
          </div>
        <button type="submit" class="btn btn-primary ">Gửi tin nhắn </button>
    </form>
</body>

</html>
